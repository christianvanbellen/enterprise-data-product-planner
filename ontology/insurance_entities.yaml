# insurance_entities.yaml — registry of recognised semantic entity labels
# Read by: OntologyLoader.allowed_entities() (Phase 3) as a validation whitelist.
# Effect: Labels here become valid BusinessEntityNode types in the semantic graph.
#         Adding a label here is necessary but not sufficient — you must also add it to
#         ENTITY_GROUPS in graph/semantic/conformed_binder.py and to the conformed schema
#         JSON for asset binding to occur. See docs/inputs.md — ENTITY_GROUPS section.

entities:
  - policyholder
  - broker
  - claim
  - coverage
  - policy
  - pricing_component
  - profitability_component
  - exposure
  - underwriter
# line_of_business removed April 2026 with Signal 3 — a product-line classification
# is a slice of other entities, not an entity itself. Product-line data remains on
# each asset as asset.tag_dimensions["product_line"].
