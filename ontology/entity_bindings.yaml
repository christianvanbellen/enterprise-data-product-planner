# entity_bindings.yaml — single source of truth for the entity layer (Phase 3)
#
# Read by:
#   - EntityMapper (graph/semantic/entity_mapper.py) — confidence weights,
#     conformed_group_to_entity, asset_name_patterns
#   - SynonymRegistry (graph/semantic/ontology_loader.py) — entities whitelist,
#     entity_signatures, column_synonyms
#
# Each asset receives zero or more (entity_label, confidence) candidates from
# four signal sources, which EntityMapper merges and resolves with the
# thresholds below. See docs/inputs.md — entity_bindings.yaml section for the
# end-to-end flow.

# ──────────────────────────────────────────────────────────────────────────
# Entity whitelist
# ──────────────────────────────────────────────────────────────────────────
# The set of labels that BusinessEntityNodes may carry. Any candidate whose
# entity_label is not in this list is silently dropped with a warning.
#
# Gap-aware philosophy: a label SHOULD appear here even if the current
# warehouse produces zero candidates for it — the resulting
# "entity: 0 candidacy" audit row is the backlog signal that tells the data
# team which business concepts the pipeline is expected to recognise but
# can't see yet. Do not remove an entity just because it's empty today.

# Last reviewed against: research_log/semantic_model/v1_2026-04-23_fab12dbc.md
# Reference framework:   reference_frameworks/commercial_specialty_pc.md (synthesised —
#                        re-curate against an authoritative internal source when available).
#
# Open questions from v1 deferred to future iterations (see research brief):
#   Q1  `quote` vs `policy` distinctness — kept both conservatively; `policy` may be
#       collapsible if the warehouse doesn't materialise a separate policy entity.
#   Q7  `policy_totals` still maps to `policy`; revisit if a `policy_financials`
#       entity is warranted.
#   Q8  `signal_2_scale: 0.8` retained; revisit after measuring audit impact of the
#       tightened signatures.

entities:
  - policyholder
  - broker
  - claim
  - coverage
  - policy
  - quote                   # v1 added — quote_id is the warehouse bus key
  - layer                   # v1 added — binds *_layer / *_layer_pricing families
  - pricing_component
  - profitability_component
  - exposure
  - underwriter             # v1 suggested removal; kept as a gap-aware signal
                            # — the empty audit row surfaces the missing UW-
                            # identity data to the data team.
  # v3 semantic_model research — 7 aspirational entities registered per initiative
  # catalogue v2. Each is backed by at least one aspirational initiative and an
  # aspirational primitive. Empty audit rows are the intended backlog signal.
  - claim_development       # v3 — reserving triangles (loss_ratio_forecasting, ibnr_reserving_support)
  - submission              # v3 — pre-bind submission artefacts (submission_triage)
  - cat_event               # v3 — catastrophe scenarios (cat_exposure_monitoring)
  - reinsurance_treaty      # v3 — outward RI programme (reinsurance_recovery_tracking)
  - bordereau               # v3 — coverholder risk schedules (delegated_authority_monitoring)
  - endorsement             # v3 — in-force change events (endorsement_mta_monitoring)
  - regulatory_return       # v3 — SII QRT / Lloyd's return artefacts (regulatory_reporting_qrt)

# ──────────────────────────────────────────────────────────────────────────
# Confidence weights
# ──────────────────────────────────────────────────────────────────────────
# These values were seeded heuristically; there is no empirical calibration
# behind them yet (documented in the entity-model research backlog). Adjust
# with taste, not with silence.

confidence:
  min_threshold:    0.4    # drop candidates below this
  conflict_threshold: 0.5  # secondary entity must reach this to coexist
  signal_2_scale:   0.8    # signature-score multiplier (column-signature scoring)
  signal_3_flat:    0.6    # tag-dimension binding
  signal_4_flat:    0.6    # asset-name pattern

# ──────────────────────────────────────────────────────────────────────────
# Signal 1: conformed-schema group → entity label
# ──────────────────────────────────────────────────────────────────────────
# For each conformed group listed in ontology/entity_groups.yaml, map the
# group name to the ontology entity it represents. Groups absent here produce
# no entity binding even if they pass the overlap threshold.

conformed_group_to_entity:
  coverage:               coverage
  policy:                 policy
  policy_totals:          policy
  profitability_measures: profitability_component
  rate_monitoring:        pricing_component
  pricing_component:      pricing_component
  exposure:               exposure
  layer:                  layer
  quote:                  quote

# ──────────────────────────────────────────────────────────────────────────
# Signal 2: per-entity column signatures
# ──────────────────────────────────────────────────────────────────────────
# Score = |asset_cols ∩ signature| / |signature|
# Entries MUST be real normalised column names. Tag values do NOT work here —
# those belong in ontology/tag_mappings.yaml under a dimension's
# entity_bindings block.
#
# The line_of_business entity is bound exclusively via Signal 3 (product_line
# tag dimension); it does not have a column signature.

entity_signatures:

  policy:
    # Slimmed down after v1 audit — policy_id / policy_number / policy_currency /
    # policy_term / policy_reference were all dead. This warehouse keys policies
    # off quote_id + pas_id (see `quote` entity) rather than a standalone policy
    # identifier. Retain the temporal columns as policy carries those.
    - policy_is_quoted
    - inception_date
    - expiry_date
    - new_renewal
    - policy_term_change

  quote:
    # v1 addition. `quote_id` is the bus key of the warehouse but appears on
    # ~every fact table, so it's excluded from the signature — it wouldn't
    # discriminate quote-shaped assets from anything else. The signature
    # below picks the narrower columns that co-occur on true quote artefacts;
    # the asset-name pattern `quote` rescues the rest.
    - pas_id
    - yoa
    - uw_adjustment
    - uw_comment

  coverage:
    # coverage_id and coverage_type were dead — v1 flagged coverage_type as
    # possibly conflated with exposure_type during normalisation (Q3 open).
    # Retaining the terms-negotiated columns that clearly belong to coverage.
    - coverage
    - primary_coverage
    - limit
    - excess
    - deductible_value
    - section

  layer:
    # v1 addition. Binds *_layers, *_layer_pricing, ClaimLayersView,
    # RMCoverageLayerView, contingency_layers, do_expiring_layers,
    # hx_fi_layer_pricing. Asset-name pattern `layer` rescues assets that
    # have fewer than 2 of these signature columns.
    - layer_id
    - layer_limit
    - limit_type

  policyholder:
    # inception_date / expiry_date moved to `policy` (they describe the contract,
    # not the insured). Dead columns (insured_name, policyholder_id) removed.
    - policyholder_name
    - entity
    - branch
    - main_domicile
    - country

  broker:
    # Trimmed to the two columns that actually appear. Asset-name pattern
    # (`brokerage` → broker) rescues broker binding where the signature is thin.
    - broker_primary
    - brokerage_pct

  claim:
    # Trimmed to real high-signal columns. Removed dead: fgu_incurred_loss,
    # paid_claims, number_claims (verify after next audit).
    - incurred
    - paid
    - reserved
    - claims_as_at
    - burn_rate_ulr
    - gg_ulr
    - gn_ulr
    - gglr_incurred
    - gnlr_incurred
    - loss_cost_inflation
    - claim_count
    - total_incurred
    - incurred_excl_specific

  underwriter:
    # Gap-aware signature — all columns below are ASPIRATIONAL. None exist in
    # the current warehouse; expected 0 candidacy. The empty audit row is the
    # point: it makes UW-identity data a visible backlog item for the data team
    # to ingest (typically from an HR/CRM-adjacent system).
    - underwriter
    - underwriter_id
    - underwriter_name
    - underwriter_team
    - uw_name
    - uw_team

  pricing_component:
    # Major rewrite per v1. The dead `premium`, `rate`, `elr` entries never
    # matched as exact normalised-column names — they appear in compound forms
    # (gross_premium, tech_rate, gg_elr) and so need to be listed explicitly.
    - tech_gnwp
    - modtech_gnwp
    - sold_gnwp
    - sold_ggwp
    - tech_ggwp
    - modtech_ggwp
    - tech_elc
    - modtech_elc
    - gross_rarc
    - net_rarc
    - rate_change
    - base_rate
    - tech_rate
    - mod_tech_rate
    - input_premium
    - gross_premium

  profitability_component:
    # Removed dead `profitability` (never a literal column name). sold_to_plan
    # is known absent (documented data gap) — not added.
    - commission
    - sold_to_tech
    - sold_to_modtech
    - modtech_to_tech
    - change_in_sold_to_tech
    - change_in_sold_to_modtech
    - target_to_plan

  exposure:
    # Tightened to the most discriminating columns — the widened v1 signature
    # diluted scores below threshold. Asset-name pattern `exposure` rescues
    # exposure-shaped assets that only have one of these.
    - exposure
    - exposure_measure
    - exposure_type
    - expiring_exposure

  # ── v3 aspirational entity signatures ──────────────────────────────────
  # All signatures below are aspirational unless a column is explicitly marked
  # `# grounded` in a trailing comment. Zero matches in the current warehouse
  # is EXPECTED — these rows exist to make the backlog auditable.

  claim_development:
    # aspirational — source: loss_ratio_forecasting, ibnr_reserving_support
    # Triangles keyed by (yoa, development_month). Warehouse holds latest snapshot only.
    - yoa                          # grounded — present in warehouse
    - dev_pattern                  # grounded — present as hint column
    - development_month            # aspirational — cas_reserving_practice_note
    - evaluation_date              # aspirational — cas_reserving_practice_note
    - gglr_incurred                # grounded
    - gnlr_incurred                # grounded
    - burn_rate_ultimate           # grounded
    - ldf                          # aspirational — loss development factor
    - bf_ultimate                  # aspirational — Bornhuetter-Ferguson ultimate
    - ultimate_loss_ratio          # aspirational
    # CURATOR TODO (Part F Q1): keep as standalone entity (makes gap visible)
    # vs collapse into `claim` with aspirational columns (lighter-weight)?

  submission:
    # aspirational — source: submission_triage
    # Pre-bind artefact preceding `quote`. Placement platform / broker email.
    - submission_id                # aspirational
    - submission_received_date     # aspirational
    - submission_status            # aspirational
    - submission_source            # aspirational — broker email / placement platform
    - broker_primary               # grounded — present on quotes
    - pas_id                       # grounded — shared key to quote
    # CURATOR TODO (Part F Q4): `submission` vs `quote` may collapse if
    # placement platforms push submission_id and quote_id as same artefact.

  cat_event:
    # aspirational — source: cat_exposure_monitoring
    - event_id                     # aspirational — lloyds_rds_standards
    - event_set                    # aspirational — RMS / AIR / Verisk
    - peril                        # aspirational
    - return_period                # aspirational
    - pml                          # aspirational — lloyds_rds_standards
    - aal                          # aspirational — annual average loss
    - rds_scenario_id              # aspirational — lloyds_rds_standards

  reinsurance_treaty:
    # aspirational — source: reinsurance_recovery_tracking
    # IMPORTANT: `our_share_pct_*` columns are subscription shares NOT cessions.
    - treaty_id                    # aspirational
    - treaty_type                  # aspirational — quota_share / xol / fac
    - cession_pct                  # aspirational
    - attachment                   # aspirational
    - limit                        # grounded — present on coverage/layer today
    - recoverable                  # aspirational
    - reinstatement_premium        # aspirational
    # CURATOR TODO (Part F Q3): scoped outward-only; may need treaty_direction
    # tag or split if inward/assumed writing is material.

  bordereau:
    # aspirational — source: delegated_authority_monitoring
    - umr                          # aspirational — lloyds_coverholder_reporting_standards
    - bordereau_id                 # aspirational
    - bordereau_period             # aspirational
    - coverholder                  # grounded — present in column_synonyms
    - binder_reference             # aspirational
    - risk_schedule_id             # aspirational
    # CURATOR TODO (Part F Q5): bordereau vs policy+source-tag — kept distinct
    # due to differing governance, cadence, and granularity.

  endorsement:
    # aspirational — source: endorsement_mta_monitoring
    - endorsement_id               # aspirational — lloyds_minimum_standards_policy_admin
    - endorsement_effective_date   # aspirational
    - change_type                  # aspirational — mta / cancellation / reinstatement
    - premium_impact               # aspirational
    - policy_id                    # aspirational — policy entity currently keyed by quote_id+pas_id

  regulatory_return:
    # aspirational — source: regulatory_reporting_qrt
    # A governance artefact tracking submission/version/signoff. The measures
    # INSIDE a return live under their value-chain entity.
    - sii_line_of_business         # aspirational
    - lloyds_syndicate_code        # aspirational
    - reporting_period             # aspirational
    - ifrs17_measurement_group     # aspirational
    - return_version               # aspirational
    - signoff_date                 # aspirational

# ──────────────────────────────────────────────────────────────────────────
# Signal 3: tag-dimension entity bindings — REMOVED April 2026
# ──────────────────────────────────────────────────────────────────────────
# The tag-dimension → entity binding was dropped after the entity-audit
# review: classifications like product_line are orthogonal to business
# entities. An asset being in the "EU PI" product line doesn't make the
# asset a line_of_business in the noun sense — it means the asset is
# classified under EU PI. Treating the classification as an entity distorted
# the primary-count distribution (77 / 207 primary assignments landed on
# line_of_business, drowning other entities).
#
# Tag data is NOT lost: it remains on each asset as asset.tag_dimensions,
# surfaces in the explorer sidebar, and continues to drive domain inference
# via DbtMetadataAdapter (tags weight 2.0 in _DOMAIN_FIELD_WEIGHTS).
#
# If lines-of-business are later needed as first-class graph nodes (e.g.
# "show me every asset in EU PI" queryable via an edge), the right design
# is a separate LineOfBusinessNode + IS_IN_LINE edge in its own axis, NOT
# a reinstatement of this signal on BusinessEntityNode.
#
# The numbering jump from 2 → 4 is preserved as a reminder of this history.

# ──────────────────────────────────────────────────────────────────────────
# Signal 4: substring in asset.normalized_name → entity label
# ──────────────────────────────────────────────────────────────────────────
# Used when column-signature scoring can't reach threshold due to sparse
# column coverage.

asset_name_patterns:
  claim:         claim
  brokerage:     broker
  quote:         quote        # v1 rescue — broadest quote-asset catcher
  layer:         layer        # v1 rescue — catches *_layers, *_layer_pricing
  exposure:      exposure     # v1 rescue — catches *_exposure_*, fleet, regional
  policyholder:  policyholder # rescue for *_policyholder_* and insured assets
  broker:        broker       # rescue — broker signature is intentionally thin

# ──────────────────────────────────────────────────────────────────────────
# Column synonyms (reference lookup, currently not wired into the pipeline)
# ──────────────────────────────────────────────────────────────────────────
# Direct column-name → entity concept lookup, exposed via
# SynonymRegistry.lookup_column_concept(). Today this is only consumed by
# tests (tests/graph/test_synonym_registry.py). Retained so the data isn't
# lost; re-evaluate whether to keep, wire up, or drop when the entity-model
# research pass lands.

column_synonyms:
  # Broker identifiers
  broker_primary:     broker
  broker_code:        broker
  broker_group:       broker
  broker_pseudo_code: broker
  coverholder:        broker
  # Policyholder identifiers
  policyholder_name:  policyholder
  entity:             policyholder
  # Claim signals
  incurred:           claim
  paid:               claim
  reserved:           claim
  burn_rate_ulr:      claim
  gg_ulr:             claim
  gn_ulr:             claim
  claim_count:        claim
  total_incurred:     claim
