    feasibility_against_warehouse: needs_foundational_work
    feasibility_rationale: "ELR columns present but no time-series reserving triangles or development patterns in warehouse"
    # Gap-aware
    blocker_class: schema_group_missing
    expected_signal: >-
      Claims development triangles — incurred and paid amounts at successive
      evaluation dates for the same YOA cohort. Warehouse holds most-recent
      snapshot only; needs a time-series ingestion of gglr_*, gnlr_*,
      burn_rate_* at monthly/quarterly evaluation dates, keyed by
      (yoa, development_month). Materialises the claims_development_triangle
      primitive.
    rationale: >-
      Chain-ladder / BF methods are industry-standard; without triangles the
      actuarial function operates blind on current-year estimates.
    data_gaps:
      - gap_type: missing_history
        description: "no claims development triangles — incurred/paid present at point-in-time but not as development series"
        feasibility_rationale: >-
          Actuarial loss ratio projection requires claims development
          triangles — incurred and paid amounts at successive evaluation
          dates for the same year-of-account cohort. The warehouse holds
          only the most recent development snapshot per claim; no historical
          evaluation series is retained, making chain-ladder and
          Bornhuetter-Ferguson methods inapplicable without a new
          time-series ingestion pattern.

