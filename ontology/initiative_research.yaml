# initiative_research.yaml — complete initiative definitions (Phases 4 and 5)
# Read by: InitiativeArchetypeLibrary at module load.
#
# Last curated against: research_log/initiatives/v1_2026-04-24_fab12dbc.md
# Reference framework: reference_frameworks/insurance_analytics_state_of_art.md
#
# ---------------------------------------------------------------------------
# Field schema
# ---------------------------------------------------------------------------
#
# Each initiative entry combines three concerns:
#
#   Scoring fields   — archetype, required_primitives, optional_primitives,
#                      business_value_score, implementation_effort_score,
#                      target_users, business_objective, output_type
#   Research fields  — category, literature_name, sources, literature_quote,
#                      feasibility_against_warehouse, feasibility_rationale,
#                      data_gaps
#   Gap-aware fields — status, blocker_class, expected_signal, rationale
#                      (see "Gap-aware schema" below)
#
# Composite score formula (Phase 4):
#   score = business_value_score
#         × readiness_multiplier        (ready_now=1.0 / ready_with_enablement=0.8 /
#                                        needs_foundational_work=0.4 / not_feasible=0.1)
#         × (1 + 0.2 × optional_ratio)  (bonus for available optional primitives)
#         × (1 − 0.3 × effort_score)    (penalty for high implementation effort)
#
# feasibility_against_warehouse caps readiness regardless of primitive matching.
# Valid values: ready_now | ready_with_enablement | needs_foundational_work | not_currently_feasible
#
# ---------------------------------------------------------------------------
# Gap-aware schema (introduced April 2026, v1 initiative research)
# ---------------------------------------------------------------------------
#
# Every initiative carries a tri-state `status`:
#
#   status: grounded | partial | aspirational
#     grounded     — required primitives + columns all present; ready to build today.
#     partial      — some signal; named pieces missing (see blocker_class / expected_signal).
#     aspirational — zero warehouse signal today, BUT load-bearing per reference
#                    framework + external sources. Registered so that when the
#                    data lands, the framing is already in place.
#
# For partial + aspirational initiatives, also:
#   blocker_class:   data_source_missing | schema_group_missing |
#                    tool_missing | governance_missing | primitive_missing
#   expected_signal: what data / primitives would need to land to move to grounded.
#   rationale:       why this is worth registering despite the gap.
#
# Aspirational initiatives are first-class outputs — the map they form IS the
# backlog signal for the data team. Do not remove an initiative just because
# its warehouse signal is zero today.
#
# feasibility_against_warehouse is retained for Python consumer compatibility
# (archetype_library.py, compiler.py, and tests read the 4-state enum). The
# tri-state status is the new curatorial anchor; a future refactor can
# collapse the two fields once consumers are updated.

