# ---------------------------------------------------------------------------
# Initiative taxonomy
# ---------------------------------------------------------------------------
# Categories aligned with domain labels in ontology/domain_keywords.yaml.
# v1 research rehomed `copilot` category to `underwriting` and renamed
# `portfolio` → `portfolio_monitoring`.

initiative_taxonomy:

  # =========================================================================
  # UNDERWRITING
  # =========================================================================

  - id: pricing_adequacy_monitoring
    status: grounded
    # Scoring
    archetype: monitoring
    required_primitives: [pricing_decomposition, rate_change_monitoring]
    # portfolio_rate_monitoring added April 2026 — the portfolio-level rate
    # roll-up is a natural enabler even though the monitoring is per-microsegment.
    optional_primitives: [profitability_decomposition, portfolio_rate_monitoring, layer_pricing]
    business_value_score: 0.85
    implementation_effort_score: 0.35
    target_users: [pricing_team, underwriting_leads]
    business_objective: "Detect portfolios drifting below technical price before they impact loss ratios"
    output_type: monitoring_dashboard
    # Research
    category: underwriting
    literature_name: "Real-time portfolio monitoring and rate adequacy"
    sources: [mckinsey_pnc_underwriting_2021, hyperexponential_insurance_ai_2025]
    literature_quote: "Leading carriers replaced periodic broad monitoring with real-time monitoring of market microsegments"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "rate_change_monitoring and pricing_decomposition primitives both fully present"
    data_gaps: []

  - id: underwriting_decision_support
    status: grounded
    # Scoring
    archetype: decision_support
    required_primitives: [quote_lifecycle, pricing_decomposition, exposure_structure]
    optional_primitives: [claims_experience, renewal_tracking]
    business_value_score: 0.88
    implementation_effort_score: 0.60
    target_users: [underwriters]
    business_objective: "Provide data-driven context at point of underwriting decision"
    output_type: decision_support
    # Research
    category: underwriting
    literature_name: "AI-assisted underwriting / decision support at point of bind"
    sources: [mckinsey_pnc_underwriting_2021, bcg_agentic_insurance_2025]
    literature_quote: "up to 36% improvement in underwriting efficiency"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "quote lifecycle, pricing decomposition, exposure structure all present"
    data_gaps: []

  - id: renewal_prioritisation
    status: grounded
    # Scoring
    archetype: prioritization
    required_primitives: [renewal_tracking, pricing_decomposition]
    optional_primitives: [profitability_decomposition, claims_experience]
    business_value_score: 0.82
    implementation_effort_score: 0.40
    target_users: [underwriters, portfolio_managers]
    business_objective: "Focus underwriter time on highest-value renewals"
    output_type: decision_support
    # Research
    category: underwriting
    literature_name: "Renewal prioritisation and portfolio triage"
    sources: [mckinsey_pnc_underwriting_2021]
    literature_quote: "identify simpler and more stable risks for light touch renewal underwriting"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "renewal_tracking and pricing_decomposition both present"
    data_gaps: []

  - id: risk_appetite_monitoring
    status: grounded
    # Scoring
    archetype: monitoring
    required_primitives: [exposure_structure, product_line_segmentation]
    optional_primitives: [quote_lifecycle]
    business_value_score: 0.75
    implementation_effort_score: 0.35
    target_users: [exposure_management, portfolio_managers]
    business_objective: "Monitor concentration risk across geography, industry, and peril"
    output_type: monitoring_dashboard
    # Research
    category: underwriting
    literature_name: "Appetite and accumulation monitoring"
    sources: [hyperexponential_insurance_ai_2025]
    literature_quote: "portfolio management agent can monitor concentration risk across geography, industry, and peril"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "exposure_structure and product_line_segmentation primitives present"
    data_gaps: []

  - id: renewal_pricing_copilot
    status: grounded
    # Scoring
    archetype: copilot
    required_primitives: [quote_lifecycle, pricing_decomposition, renewal_tracking]
    # layer_pricing added April 2026 — renewal decisions in specialty business
    # involve layer-level price comparisons.
    optional_primitives: [claims_experience, broker_attribution, layer_pricing]
    business_value_score: 0.80
    implementation_effort_score: 0.70
    target_users: [underwriters]
    business_objective: "Reduce time to gather context at renewal from hours to seconds"
    output_type: ai_agent
    # Research
    # Category rehomed `copilot` → `underwriting` per v1 research (aligns with domain labels).
    category: underwriting
    literature_name: "Natural language underwriting copilot"
    sources: [lma_ai_survey_2025, bcg_agentic_insurance_2025]
    literature_quote: "underwriters repositioned as portfolio strategists supported by autonomous agents"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "quote_lifecycle, pricing, renewal_tracking all present — sufficient structured context for LLM grounding"
    data_gaps: []

  - id: underwriter_copilot_rag
    status: aspirational
    # Scoring
    archetype: copilot
    # NEW: rag_index_over_warehouse — vector index + structured-tool interface
    # for LLM grounding. To be formally proposed in the next semantic-model pass.
    required_primitives: [quote_lifecycle, claims_experience, renewal_tracking]
    aspirational_primitives: [rag_index_over_warehouse]
    optional_primitives: [broker_attribution, pricing_decomposition]
    business_value_score: 0.85
    implementation_effort_score: 0.75
    target_users: [underwriters]
    business_objective: "Natural-language query over policy history, comparables, and prior-year renewal decisions, grounded in warehouse data"
    output_type: ai_agent
    # Research
    category: underwriting
    literature_name: "RAG-based underwriter copilot over warehouse"
    sources: [bcg_agentic_insurance_2025, evident_ai_tracker_q4_2025, lma_ai_survey_2025]
    literature_quote: "underwriters repositioned as portfolio strategists supported by autonomous agents"
    feasibility_against_warehouse: not_currently_feasible
    feasibility_rationale: "distinct from the narrower renewal_pricing_copilot — requires RAG infra + guardrails not present in warehouse today"
    # Gap-aware
    blocker_class: tool_missing
    expected_signal: >-
      A RAG indexing layer + tool-call interface over warehouse assets —
      vector index over UW comments, structured tool-calls for numeric
      lookups, guardrails for confidential data. Requires the
      rag_index_over_warehouse primitive to be added.
    rationale: >-
      87% YoY growth in insurance AI deployments concentrates on copilots;
      the renewal_pricing_copilot covers renewal narrowly, but broader
      UW-context Q&A is a distinct capability with its own architecture.
    # CURATOR TODO: Part F Q5 — Keep both copilots (current brief recommendation)
    # or merge. Distinct technical architectures argue for keeping separate.
    data_gaps:
      - gap_type: tool_missing
        description: "No RAG / vector-index infrastructure over warehouse assets"

  - id: submission_triage
    status: aspirational
    # Scoring
    archetype: automation
    # Both primitives are aspirational — `submission_intake` and
    # `broker_communications` to be formally proposed in semantic-model pass.
    required_primitives: []
    aspirational_primitives: [submission_intake, broker_communications]
    optional_primitives: [quote_lifecycle]
    business_value_score: 0.90
    implementation_effort_score: 0.80
    target_users: [underwriters, operations]
    business_objective: "Automated triage of inbound submissions to cut quote turnaround"
    output_type: ai_agent
    # Research
    category: underwriting
    literature_name: "Submission intake and automated triage"
    sources: [lma_ai_survey_2025, hyperexponential_insurance_ai_2025]
    literature_quote: "quote turnaround from three days to three minutes — 99% reduction (Hiscox)"
    feasibility_against_warehouse: not_currently_feasible
    feasibility_rationale: "requires unstructured submission documents and broker email data — not in analytical warehouse"
    # Gap-aware
    blocker_class: data_source_missing
    expected_signal: >-
      Placement platform / broker email ingestion — pre-bind artefacts
      (broker emails, ACORD forms, PDF submissions, placement platform
      feeds such as Whitespace/PPL). Warehouse is entirely post-bind PAS
      data.
    rationale: >-
      Submission-to-quote cycle time is the single highest-leverage UW ops
      metric per LMA / Hiscox case studies.
    data_gaps:
      - gap_type: missing_source_system
        description: "No submission/placement system data. Warehouse contains post-bind analytics only."
        feasibility_rationale: >-
          Submission triage requires pre-bind artefacts — broker emails,
          structured submission forms, and placement platform data. The
          current warehouse is populated exclusively from post-bind PAS
          and quote system exports; no placement or intake system feed is
          present.

  # =========================================================================
  # PRICING
  # =========================================================================

  - id: technical_price_benchmarking
    status: grounded
    # Scoring
    archetype: decision_support
    required_primitives: [pricing_decomposition, rate_change_monitoring]
    # layer_pricing added April 2026 — layer-level benchmarking is a natural
    # extension for specialty business where rates vary by layer.
    optional_primitives: [claims_experience, profitability_decomposition, layer_pricing]
    business_value_score: 0.85
    implementation_effort_score: 0.50
    target_users: [pricing_team, actuaries]
    business_objective: "Benchmark written rates against technical price across market segments"
    output_type: analytics_product
    # Research
    category: pricing
    literature_name: "ML-based pricing model and technical rate benchmarking"
    sources: [mckinsey_pnc_underwriting_2021, hyperexponential_insurance_ai_2025]
    literature_quote: "ML-based pricing models for pre-underwriting and prospect loss modeling"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "pricing_decomposition and rate_change_monitoring fully present"
    data_gaps: []

  - id: layer_rate_adequacy_monitoring
    status: grounded
    # Scoring
    # NEW initiative v1 — driven by the layer_pricing primitive and the
    # *_layer_pricing / *_layers asset families (do_layer_pricing, hx_fi_layer_pricing,
    # contingency_layers, eupi layer views).
    archetype: monitoring
    required_primitives: [layer_pricing, pricing_decomposition]
    optional_primitives: [rate_change_monitoring, portfolio_rate_monitoring]
    business_value_score: 0.78
    implementation_effort_score: 0.40
    target_users: [pricing_team, underwriters]
    business_objective: >-
      Monitor per-layer rate adequacy in specialty excess business, where
      attachment-point and limit dynamics dominate rate adequacy more than
      account-level averages
    output_type: monitoring_dashboard
    # Research
    category: pricing
    literature_name: "Layer-level rate adequacy monitoring in specialty excess"
    sources: [hyperexponential_insurance_ai_2025, mckinsey_pnc_underwriting_2021]
    literature_quote: "real-time monitoring of market microsegments"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "layer_pricing primitive present; *_layer_pricing assets bound in v1 entity research"
    data_gaps: []

  - id: rate_change_attribution_analytics
    status: grounded
    # Scoring
    # NEW initiative v1 — direct-from-columns analytics product. Warehouse
    # has gross_rarc, net_rarc, breadth_of_cover_change, gross_exposure_change,
    # gross_limits_and_excess_change, policy_term_change, other_changes,
    # claims_inflation as distinct columns.
    archetype: analytics_product
    required_primitives: [rate_change_monitoring, pricing_decomposition, exposure_structure]
    optional_primitives: [portfolio_rate_monitoring]
    business_value_score: 0.80
    implementation_effort_score: 0.35
    target_users: [pricing_team, actuaries, underwriters]
    business_objective: >-
      Decompose headline rate change into its underlying drivers (exposure change,
      limit change, breadth-of-cover change, commission, claims inflation, other)
      to inform renewal decisions
    output_type: analytics_product
    # Research
    category: pricing
    literature_name: "Rate-change attribution and decomposition"
    sources: [mckinsey_pnc_underwriting_2021, cas_rate_change_attribution]
    literature_quote: "rate-change decomposition"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "all decomposition columns already present in warehouse"
    data_gaps: []

  # =========================================================================
  # CLAIMS
  # =========================================================================

  - id: claims_experience_analysis
    status: grounded
    # Scoring
    archetype: decision_support
    required_primitives: [claims_experience, pricing_decomposition]
    optional_primitives: [product_line_segmentation, exposure_structure]
    business_value_score: 0.83
    implementation_effort_score: 0.35
    target_users: [actuaries, underwriters, claims_team]
    business_objective: "Understand loss development patterns to improve pricing and reserving"
    output_type: analytics_product
    # Research
    category: claims
    literature_name: "Claims trend analysis and loss ratio benchmarking"
    sources: [mckinsey_pnc_underwriting_2021, evident_ai_tracker_q4_2025]
    literature_quote: "claims-trend analyses to identify product features that are proving more or less profitable"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "claims_experience primitive present across 32 assets"
    data_gaps: []

  - id: claims_severity_prediction
    status: partial
    # Scoring
    archetype: prediction
    required_primitives: [claims_experience]
    aspirational_primitives: [claim_outcome_label]
    optional_primitives: [exposure_structure]
    business_value_score: 0.75
    implementation_effort_score: 0.65
    target_users: [actuaries, claims_team]
    business_objective: "Predict ultimate claims severity at notification to improve case reserving adequacy"
    output_type: analytics_product
    # Research
    category: claims
    literature_name: "Claims severity prediction and reserving adequacy"
    sources: [evident_ai_tracker_q4_2025]
    literature_quote: "claims management representing 37% of AI deployments"
    feasibility_against_warehouse: needs_foundational_work
    feasibility_rationale: "claims experience present but no outcome labels — no confirmed final settlement data to train severity model"
    # Gap-aware
    blocker_class: primitive_missing
    expected_signal: >-
      Closed-claim outcome labels — final_settlement_amount and
      claim_closed_date fields per claim, representing ground truth for
      a supervised severity model. Warehouse captures development-stage
      incurred/paid but no closure field. Requires claim_outcome_label
      primitive.
    rationale: >-
      Severity prediction is the highest-ROI claims ML application per
      Evident AI tracker; without labels, models cannot be calibrated.
    data_gaps:
      - gap_type: insufficient_outcome_labels
        description: "claims_experience shows incurred/paid but no finalised settlement outcomes for ML target variable"
        feasibility_rationale: >-
          Warehouse captures development-stage incurred and paid amounts
          but has no closed-claim ultimate or confirmed settlement field.
          Supervised severity models require a labelled target variable
          representing true ultimate loss.

  - id: claims_fraud_detection
    status: aspirational
    # CURATOR TODO: Part F Q2 — Brief lowered BV 0.75 → 0.70 noting specialty
    # claim volumes may not support ML calibration. Alternative: remove as
    # conceptually wrong for specialty, rather than demote to aspirational.
    # Scoring
    archetype: anomaly_detection
    required_primitives: []
    aspirational_primitives: [fraud_labels, claim_event_timeline]
    optional_primitives: [claims_experience]
    business_value_score: 0.70
    implementation_effort_score: 0.70
    target_users: [claims_team, finance]
    business_objective: "Flag anomalous claims patterns for SIU investigation"
    output_type: monitoring_dashboard
    # Research
    category: claims
    literature_name: "Claims fraud detection and anomaly flagging"
    sources: [evident_ai_tracker_q4_2025]
    literature_quote: "fraud detection — patterns across claims or submissions flagged instantly"
    feasibility_against_warehouse: not_currently_feasible
    feasibility_rationale: "no fraud labels, no confirmed fraud outcomes, no interaction history for behavioural signals"
    # Gap-aware
    blocker_class: primitive_missing
    expected_signal: >-
      Two primitives needed: fraud_labels (confirmed-fraud flags, SIU
      referral outcomes, recoveries) for supervised training, and
      claim_event_timeline (timestamped adjuster events, status
      transitions, document uploads) for behavioural signals.
    rationale: >-
      Fraud loss is a material leakage item; but specialty claims volumes
      are low, so model calibration needs strong labels — noting this may
      never pay off in some specialty books.
    data_gaps:
      - gap_type: insufficient_outcome_labels
        description: "no confirmed fraud labels in warehouse"
      - gap_type: missing_event_timeline
        description: "no claims interaction or investigation event log"

  - id: claims_automation
    status: aspirational
    # Scoring
    archetype: automation
    required_primitives: []
    aspirational_primitives: [claims_operational_events]
    optional_primitives: [claims_experience]
    business_value_score: 0.82
    implementation_effort_score: 0.85
    target_users: [claims_team, operations]
    business_objective: "End-to-end agentic claims triage and routing"
    output_type: ai_agent
    # Research
    category: claims
    literature_name: "Automated claims processing and routing"
    sources: [evident_ai_tracker_q4_2025, bcg_agentic_insurance_2025]
    literature_quote: "end-to-end automation via agentic AI in claims management"
    feasibility_against_warehouse: not_currently_feasible
    feasibility_rationale: "requires operational claims system data and workflow event log — warehouse contains experience analytics only"
    # Gap-aware
    blocker_class: data_source_missing
    expected_signal: >-
      Claims management system operational feed — registration events,
      task assignments, reserve movements, adjuster workflow states.
      Warehouse has finalised experience analytics only (EUPI/GGLR/GNLR
      aggregates).
    rationale: >-
      Claims is 37% of insurance AI spend (Evident); agentic workflow
      orchestration requires operational event streams.
    data_gaps:
      - gap_type: missing_source_system
        description: "no claims management system operational data in warehouse"

