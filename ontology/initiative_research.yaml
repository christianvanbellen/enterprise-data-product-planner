# initiative_research.yaml — complete initiative definitions (Phases 4 and 5)
# Read by: InitiativeArchetypeLibrary at module load.
#
# Each initiative entry combines two previously-separate concerns:
#   Scoring fields   — archetype, required_primitives, optional_primitives,
#                      business_value_score, implementation_effort_score,
#                      target_users, business_objective, output_type
#   Research fields  — category, literature_name, sources, literature_quote,
#                      feasibility_against_warehouse, feasibility_rationale, data_gaps
#
# Composite score formula (Phase 4):
#   score = business_value_score
#         × readiness_multiplier        (ready_now=1.0 / ready_with_enablement=0.8 /
#                                        needs_foundational_work=0.4 / not_feasible=0.1)
#         × (1 + 0.2 × optional_ratio)  (bonus for available optional primitives)
#         × (1 − 0.3 × effort_score)    (penalty for high implementation effort)
#
# feasibility_against_warehouse caps readiness regardless of primitive matching.
# Valid values: ready_now | ready_with_enablement | needs_foundational_work | not_currently_feasible

# ---------------------------------------------------------------------------
# Bibliography
# ---------------------------------------------------------------------------

sources:
  - id: mckinsey_pnc_underwriting_2021
    title: "How data and analytics are redefining excellence in P&C underwriting"
    publisher: McKinsey & Company
    year: 2021
    url: https://www.mckinsey.com/industries/financial-services/our-insights/how-data-and-analytics-are-redefining-excellence-in-p-and-c-underwriting

  - id: evident_ai_tracker_q4_2025
    title: "Insurance AI deployments jump 87% as GenAI and agentic systems expand"
    publisher: Evident / Reinsurance News
    year: 2025
    url: https://www.reinsurancene.ws/insurance-ai-deployments-jump-87

  - id: lma_ai_survey_2025
    title: "LMA AI Survey April 2025"
    publisher: Lloyd's Market Association
    year: 2025

  - id: bcg_agentic_insurance_2025
    title: "Multi-agent AI systems in underwriting"
    publisher: BCG
    year: 2025

  - id: hyperexponential_insurance_ai_2025
    title: "How AI and Data Technology Are Transforming the Insurance Industry"
    publisher: hyperexponential
    year: 2025
    url: https://www.hyperexponential.com/blog/how-ai-and-data-technology-are-transforming-the-insurance-industry

# ---------------------------------------------------------------------------
# Initiative taxonomy
# ---------------------------------------------------------------------------

initiative_taxonomy:

  # --- UNDERWRITING ---

  - id: pricing_adequacy_monitoring
    # Scoring
    archetype: monitoring
    required_primitives: [pricing_decomposition, rate_change_monitoring]
    # portfolio_rate_monitoring added April 2026 (v1 entity research) — the
    # portfolio-level rate roll-up is a natural enabler for adequacy monitoring
    # even though the monitoring itself is per-microsegment.
    optional_primitives: [profitability_decomposition, portfolio_rate_monitoring, layer_pricing]
    business_value_score: 0.85
    implementation_effort_score: 0.35
    target_users: [pricing_team, underwriting_leads]
    business_objective: "Detect portfolios drifting below technical price before they impact loss ratios"
    output_type: monitoring_dashboard
    # Research
    category: underwriting
    literature_name: "Real-time portfolio monitoring and rate adequacy"
    sources: [mckinsey_pnc_underwriting_2021, hyperexponential_insurance_ai_2025]
    literature_quote: "Leading carriers replaced periodic broad monitoring with real-time monitoring of market microsegments"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "rate_change_monitoring and pricing_decomposition primitives both fully present"
    data_gaps: []

  - id: underwriting_decision_support
    # Scoring
    archetype: decision_support
    required_primitives: [quote_lifecycle, pricing_decomposition, exposure_structure]
    optional_primitives: [claims_experience, renewal_tracking]
    business_value_score: 0.88
    implementation_effort_score: 0.60
    target_users: [underwriters]
    business_objective: "Provide data-driven context at point of underwriting decision"
    output_type: decision_support
    # Research
    category: underwriting
    literature_name: "AI-assisted underwriting / decision support at point of bind"
    sources: [mckinsey_pnc_underwriting_2021, bcg_agentic_insurance_2025]
    literature_quote: "up to 36% improvement in underwriting efficiency"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "quote lifecycle, pricing decomposition, exposure structure all present"
    data_gaps: []

  - id: submission_triage
    # Scoring
    archetype: automation
    required_primitives: []
    optional_primitives: [quote_lifecycle]
    business_value_score: 0.90
    implementation_effort_score: 0.80
    target_users: [underwriters, operations]
    business_objective: "Reduce quote turnaround time by automated triage of incoming submissions"
    output_type: ai_agent
    # Research
    category: underwriting
    literature_name: "Submission intake and automated triage"
    sources: [lma_ai_survey_2025, hyperexponential_insurance_ai_2025]
    literature_quote: "quote turnaround from three days to three minutes — 99% reduction (Hiscox)"
    feasibility_against_warehouse: not_currently_feasible
    feasibility_rationale: "requires unstructured submission documents and broker email data — not in analytical warehouse"
    data_gaps:
      - gap_type: missing_source_system
        description: "No submission/placement system data. Warehouse contains post-bind analytics only."
        feasibility_rationale: "Submission triage requires pre-bind artefacts — broker emails, structured
          submission forms, and placement platform data. The current warehouse is populated exclusively
          from post-bind PAS and quote system exports; no placement or intake system feed is present."

  - id: renewal_prioritisation
    # Scoring
    archetype: prioritization
    required_primitives: [renewal_tracking, pricing_decomposition]
    optional_primitives: [profitability_decomposition, claims_experience]
    business_value_score: 0.82
    implementation_effort_score: 0.40
    target_users: [underwriters, portfolio_managers]
    business_objective: "Focus underwriter time on highest-value renewals"
    output_type: decision_support
    # Research
    category: underwriting
    literature_name: "Renewal prioritisation and portfolio triage"
    sources: [mckinsey_pnc_underwriting_2021]
    literature_quote: "identify simpler and more stable risks for light touch renewal underwriting"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "renewal_tracking and pricing_decomposition both present"
    data_gaps: []

  - id: risk_appetite_monitoring
    # Scoring
    archetype: monitoring
    required_primitives: [exposure_structure, product_line_segmentation]
    optional_primitives: [quote_lifecycle]
    business_value_score: 0.75
    implementation_effort_score: 0.35
    target_users: [exposure_management, portfolio_managers]
    business_objective: "Monitor concentration risk across geography, industry, and peril"
    output_type: monitoring_dashboard
    # Research
    category: underwriting
    literature_name: "Appetite and accumulation monitoring"
    sources: [hyperexponential_insurance_ai_2025]
    literature_quote: "portfolio management agent can monitor concentration risk across geography, industry, and peril"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "exposure_structure and product_line_segmentation primitives present"
    data_gaps: []

  # --- PRICING ---

  - id: technical_price_benchmarking
    # Scoring
    archetype: decision_support
    required_primitives: [pricing_decomposition, rate_change_monitoring]
    # layer_pricing added April 2026 (v1 entity research) — layer-level
    # benchmarking is a natural extension of technical price benchmarking
    # for specialty business where rates vary by layer.
    optional_primitives: [claims_experience, profitability_decomposition, layer_pricing]
    business_value_score: 0.85
    implementation_effort_score: 0.50
    target_users: [pricing_team, actuaries]
    business_objective: "Benchmark written rates against technical price across market segments"
    output_type: analytics_product
    # Research
    category: pricing
    literature_name: "ML-based pricing model and technical rate benchmarking"
    sources: [mckinsey_pnc_underwriting_2021, hyperexponential_insurance_ai_2025]
    literature_quote: "ML-based pricing models for pre-underwriting and prospect loss modeling"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "pricing_decomposition and rate_change_monitoring fully present"
    data_gaps: []

  - id: dynamic_pricing_model
    # Scoring
    archetype: automation
    required_primitives: []
    optional_primitives: []
    business_value_score: 0.65
    implementation_effort_score: 0.90
    target_users: [pricing_team]
    business_objective: "Adjust premiums dynamically based on real-time risk signals"
    output_type: ai_agent
    # Research
    category: pricing
    literature_name: "Dynamic / behaviour-based pricing"
    sources: [hyperexponential_insurance_ai_2025]
    literature_quote: "dynamic pricing models that adjust premiums based on actual risk"
    feasibility_against_warehouse: not_currently_feasible
    feasibility_rationale: "requires real-time external risk data feeds and IoT/telematics — not applicable to specialty London Market"
    data_gaps:
      - gap_type: missing_source_system
        description: "Specialty lines do not use behaviour-based dynamic pricing. Not applicable to this market."
        feasibility_rationale: "Dynamic pricing depends on real-time behavioural signals (telematics, IoT
          sensor data, live risk feeds) that are structurally absent from a specialty London Market
          warehouse. Specialty risks are individually underwritten; no continuous exposure feed or
          in-period risk adjustment mechanism exists in the current data architecture."

  # --- CLAIMS ---

  - id: claims_experience_analysis
    # Scoring
    archetype: decision_support
    required_primitives: [claims_experience, pricing_decomposition]
    optional_primitives: [product_line_segmentation, exposure_structure]
    business_value_score: 0.83
    implementation_effort_score: 0.35
    target_users: [actuaries, underwriters, claims_team]
    business_objective: "Understand loss development patterns to improve pricing and reserving"
    output_type: analytics_product
    # Research
    category: claims
    literature_name: "Claims trend analysis and loss ratio benchmarking"
    sources: [mckinsey_pnc_underwriting_2021, evident_ai_tracker_q4_2025]
    literature_quote: "claims-trend analyses to identify product features that are proving more or less profitable"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "claims_experience primitive present across 32 assets"
    data_gaps: []

  - id: claims_severity_prediction
    # Scoring
    archetype: prediction
    required_primitives: [claims_experience]
    optional_primitives: [exposure_structure]
    business_value_score: 0.80
    implementation_effort_score: 0.65
    target_users: [actuaries, claims_team]
    business_objective: "Predict ultimate claims severity to improve reserving adequacy"
    output_type: analytics_product
    # Research
    category: claims
    literature_name: "Claims severity prediction and reserving adequacy"
    sources: [evident_ai_tracker_q4_2025]
    literature_quote: "claims management representing 37% of AI deployments"
    feasibility_against_warehouse: needs_foundational_work
    feasibility_rationale: "claims experience present but no outcome labels — no confirmed final settlement data to train severity model"
    data_gaps:
      - gap_type: insufficient_outcome_labels
        description: "claims_experience shows incurred/paid but no finalised settlement outcomes for ML target variable"
        feasibility_rationale: "Warehouse captures development-stage incurred and paid amounts but has no
          closed-claim ultimate or confirmed settlement field. Supervised severity models require a
          labelled target variable representing true ultimate loss."

  - id: claims_fraud_detection
    # Scoring
    archetype: anomaly_detection
    required_primitives: []
    optional_primitives: [claims_experience]
    business_value_score: 0.75
    implementation_effort_score: 0.70
    target_users: [claims_team, finance]
    business_objective: "Flag anomalous claims patterns for investigation"
    output_type: monitoring_dashboard
    # Research
    category: claims
    literature_name: "Claims fraud detection and anomaly flagging"
    sources: [evident_ai_tracker_q4_2025]
    literature_quote: "fraud detection — patterns across claims or submissions flagged instantly"
    feasibility_against_warehouse: not_currently_feasible
    feasibility_rationale: "no fraud labels, no confirmed fraud outcomes, no interaction history for behavioural signals"
    data_gaps:
      - gap_type: insufficient_outcome_labels
        description: "no confirmed fraud labels in warehouse"
        feasibility_rationale: "No SIU referral outcomes, confirmed-fraud flags, or recovery dispositions
          exist in the current warehouse. Without ground-truth labels, model thresholds cannot be
          calibrated and alert precision is unknown."
      - gap_type: missing_event_timeline
        description: "no claims interaction or investigation event log"
        feasibility_rationale: "Claims management system interaction records (adjuster contacts, status
          changes, document uploads) are not currently ingested. Behavioural fraud signals such as
          time-to-submission and re-open rates require timestamped events."

  - id: claims_automation
    # Scoring
    archetype: automation
    required_primitives: []
    optional_primitives: [claims_experience]
    business_value_score: 0.85
    implementation_effort_score: 0.85
    target_users: [claims_team, operations]
    business_objective: "Automate routine claims processing via end-to-end agentic AI"
    output_type: ai_agent
    # Research
    category: claims
    literature_name: "Automated claims processing and routing"
    sources: [evident_ai_tracker_q4_2025, bcg_agentic_insurance_2025]
    literature_quote: "end-to-end automation via agentic AI in claims management"
    feasibility_against_warehouse: not_currently_feasible
    feasibility_rationale: "requires operational claims system data and workflow event log — warehouse contains experience analytics only"
    data_gaps:
      - gap_type: missing_source_system
        description: "no claims management system operational data in warehouse"
        feasibility_rationale: "Automated claims routing requires real-time operational feeds from the
          claims management system — claim registration events, task assignments, reserve movements,
          and adjuster workflow states. The warehouse contains only finalised experience analytics
          (EUPI/GGLR/GNLR aggregates); no operational or transactional claims data is ingested."

  # --- PORTFOLIO ---

  - id: portfolio_drift_monitoring
    # Scoring
    archetype: anomaly_detection
    # portfolio_rate_monitoring promoted to required April 2026 (v1 entity
    # research) — the portfolio-level rate roll-up is the direct feed for
    # drift monitoring; this initiative's whole point is the roll-up view.
    required_primitives: [rate_change_monitoring, exposure_structure, portfolio_rate_monitoring]
    optional_primitives: [product_line_segmentation, claims_experience]
    business_value_score: 0.80
    implementation_effort_score: 0.30
    target_users: [portfolio_managers, actuaries]
    business_objective: "Early warning of portfolio drift before it becomes a loss event"
    output_type: monitoring_dashboard
    # Research
    category: portfolio
    literature_name: "Portfolio drift and concentration monitoring"
    sources: [mckinsey_pnc_underwriting_2021, hyperexponential_insurance_ai_2025]
    literature_quote: "real-time monitoring of market microsegments detecting impact in weeks not months"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "rate_change_monitoring and exposure_structure present"
    data_gaps: []

  - id: cat_exposure_monitoring
    # Scoring
    archetype: monitoring
    required_primitives: []
    optional_primitives: [exposure_structure]
    business_value_score: 0.90
    implementation_effort_score: 0.80
    target_users: [exposure_management, portfolio_managers]
    business_objective: "Stress-test portfolio performance across catastrophe scenarios"
    output_type: monitoring_dashboard
    # Research
    category: portfolio
    literature_name: "Catastrophe exposure and accumulation monitoring"
    sources: [hyperexponential_insurance_ai_2025]
    literature_quote: "stress-test portfolio performance across multiple scenarios simultaneously"
    feasibility_against_warehouse: not_currently_feasible
    feasibility_rationale: "no CAT model outputs, no PML data, no geographic risk scoring in warehouse"
    data_gaps:
      - gap_type: missing_source_system
        description: "no catastrophe modelling system output in warehouse (RMS/AIR/Verisk feeds absent)"
        feasibility_rationale: "CAT exposure monitoring requires probabilistic loss outputs from a
          catastrophe modelling platform (RMS, AIR, or Verisk). No PML estimates, event-set loss
          tables, or geographic risk scores are present in the warehouse. Coverage structure fields
          (jurisdiction, limit, deductible) are available but cannot be converted to modelled loss
          without a CAT engine integration."

  # --- DISTRIBUTION ---

  - id: broker_performance_intelligence
    # Scoring
    archetype: recommendation
    required_primitives: [broker_attribution, pricing_decomposition]
    optional_primitives: [claims_experience, profitability_decomposition]
    business_value_score: 0.78
    implementation_effort_score: 0.45
    target_users: [distribution_team, underwriting_leads]
    business_objective: "Identify highest-quality broker relationships and optimise channel mix"
    output_type: analytics_product
    # Research
    category: distribution
    literature_name: "Broker and channel performance analytics"
    sources: [lma_ai_survey_2025]
    literature_quote: "broker-carrier connectivity as foundational to sustained performance"
    feasibility_against_warehouse: ready_with_enablement
    feasibility_rationale: "broker_attribution primitive present but broker_code missing — limits cross-portfolio broker analysis"
    data_gaps:
      - gap_type: weak_identifier
        description: "broker_code absent — broker_primary exists but is a name string not a stable identifier"

  - id: delegated_authority_monitoring
    # Scoring
    archetype: monitoring
    required_primitives: [broker_attribution]
    optional_primitives: [claims_experience]
    business_value_score: 0.70
    implementation_effort_score: 0.60
    target_users: [distribution_team, portfolio_managers]
    business_objective: "Monitor coverholder and delegated authority portfolio performance"
    output_type: analytics_product
    # Research
    category: distribution
    literature_name: "Delegated authority / coverholder performance monitoring"
    sources: [lma_ai_survey_2025]
    literature_quote: "delegated authority and broker-led placement models expanding"
    feasibility_against_warehouse: needs_foundational_work
    feasibility_rationale: "coverholder column present but no bordereaux-level data in warehouse"
    data_gaps:
      - gap_type: missing_source_system
        description: "no bordereaux ingestion in current warehouse — delegated authority data not modelled"
        feasibility_rationale: "Coverholder monitoring requires bordereaux-level data — individual risk
          schedules submitted by managing agents under binding authority agreements. While a
          coverholder name field exists on policy records, no bordereaux ingestion pipeline is
          present; all current data reflects direct-written business through the PAS."

  # --- PROFITABILITY ---

  - id: profitability_decomposition_assistant
    # Scoring
    archetype: decision_support
    required_primitives: [profitability_decomposition, pricing_decomposition]
    optional_primitives: [broker_attribution]
    business_value_score: 0.75
    implementation_effort_score: 0.25
    target_users: [actuaries, finance, underwriting_leads]
    business_objective: "Understand drivers of profitability gap vs plan"
    output_type: analytics_product
    # Research
    category: profitability
    literature_name: "Profitability decomposition and plan variance"
    sources: [mckinsey_pnc_underwriting_2021]
    literature_quote: "claims-trend analyses to identify product features proving more or less profitable"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "profitability_decomposition and pricing_decomposition present"
    data_gaps: []

  - id: loss_ratio_forecasting
    # Scoring
    archetype: prediction
    required_primitives: [claims_experience, profitability_decomposition]
    optional_primitives: [pricing_decomposition]
    business_value_score: 0.80
    implementation_effort_score: 0.55
    target_users: [actuaries, finance]
    business_objective: "Project loss ratios and actuarial reserving requirements"
    output_type: analytics_product
    # Research
    category: profitability
    literature_name: "Loss ratio forecasting and actuarial projection"
    sources: [mckinsey_pnc_underwriting_2021]
    literature_quote: "3 to 5 point improvement in loss ratios from leading analytics capabilities"
    feasibility_against_warehouse: needs_foundational_work
    feasibility_rationale: "ELR columns present but no time-series reserving triangles or development patterns in warehouse"
    data_gaps:
      - gap_type: missing_history
        description: "no claims development triangles — incurred/paid present at point-in-time but not as development series"
        feasibility_rationale: "Actuarial loss ratio projection requires claims development triangles —
          incurred and paid amounts at successive evaluation dates for the same year-of-account
          cohort. The warehouse holds only the most recent development snapshot per claim; no
          historical evaluation series is retained, making chain-ladder and Bornhuetter-Ferguson
          methods inapplicable without a new time-series ingestion pattern."

  # --- COPILOTS / AGENTS ---

  - id: renewal_pricing_copilot
    # Scoring
    archetype: copilot
    required_primitives: [quote_lifecycle, pricing_decomposition, renewal_tracking]
    # layer_pricing added April 2026 (v1 entity research) — renewal decisions
    # in specialty business involve layer-level price comparisons.
    optional_primitives: [claims_experience, broker_attribution, layer_pricing]
    business_value_score: 0.80
    implementation_effort_score: 0.70
    target_users: [underwriters]
    business_objective: "Reduce time to gather context at renewal from hours to seconds"
    output_type: ai_agent
    # Research
    category: copilot
    literature_name: "Natural language underwriting copilot"
    sources: [lma_ai_survey_2025, bcg_agentic_insurance_2025]
    literature_quote: "underwriters repositioned as portfolio strategists supported by autonomous agents"
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "quote_lifecycle, pricing, renewal_tracking all present — sufficient structured context for LLM grounding"
    data_gaps: []

  - id: product_line_performance_dashboard
    # Scoring
    archetype: monitoring
    required_primitives: [product_line_segmentation, pricing_decomposition]
    optional_primitives: [claims_experience, profitability_decomposition]
    business_value_score: 0.72
    implementation_effort_score: 0.30
    target_users: [product_leads, underwriting_management]
    business_objective: "Single view of portfolio health by product line"
    output_type: monitoring_dashboard
    # Research
    category: monitoring
    literature_name: "Product line and class of business performance view"
    sources: [evident_ai_tracker_q4_2025]
    feasibility_against_warehouse: ready_now
    feasibility_rationale: "product_line_segmentation and pricing_decomposition present across all 5 product lines"
    data_gaps: []
