version: 2

# ─────────────────────────────────────────────────────────────────────────
# Mart layer — canonical marts + question-specific views.
#
# Architecture
# ------------
# Each canonical mart is materialised as a table at the layer grain
# (quote_id, layer_id, pas_id). Question-specific views are dbt views
# over the canonical mart — each fulfils one initiative from
# initiative_research.yaml as documented in ontology/mart_plan.yaml.
#
# Test severity
# -------------
#   • Canonical mart PK uniqueness, not_null on identifiers       → error
#   • Bound checks on derived percentages and bands               → warn
#     (synthetic mock data may drift outside calibrated bands;
#     tighten to error once calibrated against real warehouse outputs.)
# ─────────────────────────────────────────────────────────────────────────

models:

  # ═════════════════════════════════════════════════════════════════════
  # CANONICAL MARTS
  # ═════════════════════════════════════════════════════════════════════

  - name: mart_pricing_adequacy
    description: |
      Canonical pricing-adequacy mart at (quote_id, layer_id, pas_id) grain.
      Carries the union of columns needed by four fulfilment views
      (portfolio_drift_heatmap, layer_attachment_ladder, segment_benchmark,
      rate_change_waterfall) plus headline derived KPIs: adequacy_gap_*,
      rate_on_line, layer_attachment_ratio, elr_drift_modtech_minus_tech,
      gross_rarc_residual_check, adequacy_band.

      Canonical question:
        Where is sold premium drifting from technical price across my
        book, and what's driving the gap?

      Mart plan: ontology/mart_plan.yaml :: pricing_adequacy_mart
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [quote_id, layer_id, pas_id]
    columns:

      - name: quote_id
        description: Quote-level business key.
        tests: [not_null]

      - name: layer_id
        description: Layer-level business key.
        tests: [not_null]

      - name: pas_id
        description: Policy administration system key.
        tests: [not_null]

      - name: adequacy_gap_modtech_pct
        description: (sold_gnwp / modtech_gnwp) − 1. Negative => sold below modtech.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= -0.50 and adequacy_gap_modtech_pct <= 0.50"
              severity: warn

      - name: adequacy_gap_tech_pct
        description: (sold_gnwp / tech_gnwp) − 1.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= -0.60 and adequacy_gap_tech_pct <= 0.60"
              severity: warn

      - name: rate_on_line
        description: sold_gnwp / coverage_limit_amount. Specialty-excess adequacy benchmark.

      - name: layer_attachment_ratio
        description: excess / coverage_limit_amount. Indicative of how excess the layer attaches.

      - name: gross_rarc
        description: Per-layer Gross Risk-Adjusted Rate Change.

      - name: gross_rarc_residual_check
        description: |
          gross_rarc minus the sum of named drivers. Should be ≈ 0 if upstream
          decomposition reconciles. Tolerance is wide: this is a data-quality
          signal, not a hard invariant — components in Pack B are drawn
          independently in the mock generator.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= -0.30 and gross_rarc_residual_check <= 0.30"
              severity: warn

      - name: adequacy_band
        description: Categorical bucket of adequacy_gap_modtech_pct for at-a-glance dashboards.
        tests:
          - accepted_values:
              values: ['below_modtech_severe', 'below_modtech_mild', 'on_modtech', 'above_modtech', 'unknown']

      - name: has_multi_coverage_rollup
        description: True when >1 coverage row was rolled up to this layer (audit flag).

  # ─────────────────────────────────────────────────────────────────────
  - name: mart_renewal_decision_support
    description: |
      Canonical renewal decision-support mart at (quote_id, layer_id, pas_id)
      grain, renewal-only. Carries pricing decomposition, coverage
      structure, year-on-year premium delta, the composite priority_score
      (0..100), and a discrete priority_band (high / medium / low).

      Canonical question:
        For each open renewal, which warrant active negotiation, and what
        context does the underwriter need to decide?

      Mart plan: ontology/mart_plan.yaml :: renewal_decision_support_mart
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [quote_id, layer_id, pas_id]
    columns:

      - name: quote_id
        tests: [not_null]
      - name: layer_id
        tests: [not_null]
      - name: pas_id
        tests: [not_null]

      - name: new_renewal
        description: Always 'Renewal' in this mart (filter applied).
        tests:
          - accepted_values:
              values: ['Renewal']

      - name: priority_score
        description: Composite 0..100 priority. Higher => more underwriter attention warranted.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0 and priority_score <= 100"

      - name: priority_band
        description: Discrete triage band derived from priority_score thresholds.
        tests:
          - accepted_values:
              values: ['high', 'medium', 'low']

      - name: days_to_renewal_inception
        description: Days from current_date to renewal_inception_date. Negative for renewals already incepted.

      - name: adequacy_gap_modtech_pct
        description: (sold_gnwp / modtech_gnwp) − 1.

      - name: rate_on_line
        description: sold_gnwp / coverage_limit_amount.

      - name: has_multi_coverage_rollup
        description: True when >1 coverage row was rolled up to this layer.

  # ═════════════════════════════════════════════════════════════════════
  # FULFILMENT VIEWS — one per business question (see ontology/mart_plan.yaml)
  # ═════════════════════════════════════════════════════════════════════

  - name: view_portfolio_drift_heatmap
    description: |
      Fulfils initiative `pricing_adequacy_monitoring`.
      Question: Where in my portfolio is sold premium drifting below
      technical price, and by how much?
      Asker: pricing_team · Cadence: weekly
    columns:
      - name: adequacy_band
        tests:
          - accepted_values:
              values: ['below_modtech_severe', 'below_modtech_mild', 'on_modtech', 'above_modtech', 'unknown']

  - name: view_layer_attachment_ladder
    description: |
      Fulfils initiative `layer_rate_adequacy_monitoring`.
      Question: Which layers in my specialty excess book are written
      below technical adequacy, and is the gap widening on renewal?
      Asker: pricing_team · Cadence: weekly

  - name: view_segment_benchmark
    description: |
      Fulfils initiative `technical_price_benchmarking`.
      Question: How does our written rate compare to the technical price
      across segments, brokers, and underwriters?
      Asker: pricing_team · Cadence: monthly

  - name: view_rate_change_waterfall
    description: |
      Fulfils initiative `rate_change_attribution_analytics`.
      Question: How much of this renewal's rate change came from
      deliberate pricing action versus structural changes in exposure,
      limit, breadth, or claims inflation?
      Asker: pricing_team / actuary · Cadence: per_renewal
      Filtered to renewals only (gross_rarc not null).

  - name: view_renewal_priority_queue
    description: |
      Fulfils initiative `renewal_prioritisation`.
      Question: Of my open renewal queue, which renewals warrant active
      negotiation versus a light-touch pass?
      Asker: underwriter · Cadence: weekly
    columns:
      - name: priority_band
        tests:
          - accepted_values:
              values: ['high', 'medium', 'low']

  - name: view_underwriting_risk_context
    description: |
      Fulfils initiative `underwriting_decision_support`.
      Question: For the risk in front of me, what does the warehouse
      already know about comparable layers, this insured's history, and
      our pricing position?
      Asker: underwriter · Cadence: per_quote
